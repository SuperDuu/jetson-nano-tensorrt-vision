# Unified Configuration for RBC2026 Super Manager

system:
  initial_state: 2 # 0: IDLE, 1: Target (V1), 2: KFS (V2)
  load_mode: 3 # 1: KFS only, 2: SpearHead only, 3: All models + UART switching
  force_square: True # Use square letterbox for display and error calculation
  inference_skip: 3 # Run inference every N frames
  headless: false # Run without GUI (terminal only)
  target_fps: 30 # Fixed loop rate for stability
  test_image: false # If true, use a static image instead of camera
  test_image_path: "KFS_Standard/datasets/user_test/img_test_user1.jpg"

detection:
  max_loss_frames: 15 # Frames to keep Kalman prediction after target lost
  ema_alpha: 0.7 # Smoothing factor for bounding boxes (0.0 to 1.0)

hardware:
  camera:
    device_id: 0
    width: 640
    height: 480
  serial:
    port: "COM10"
    baudrate: 115200

v1_model:
  name: "SpearHead"
  yolo_engine: "models/yolo_sp.engine"
  device: "GPU"
  input_size: 512
  conf_threshold: 0.7
  nms_threshold: 0.5
  target_name: "Target"
  # Preprocessing
  use_clahe: true
  clip_limit: 1.5
  mean: [0.0, 0.0, 0.0]  # Standard YOLOv8 (0..255)
  std: [255.0, 255.0, 255.0]
 
v2_model:
  name: "KFS"
  yolo_engine: "models/yolo_kfs.engine"
  yolo_device: "GPU"
  cnn_engine: "models/classifier_v3.engine"
  cnn_device: "GPU"
  labels_json: "models/labels_v2.3.json"
  yolo_input_size: 512
  cnn_input_size: 64
  conf_threshold_yolo: 0.7
  conf_threshold_cnn: 0.7
  background_value: 128
  target_types: ["REAL"]
  # Preprocessing
  use_clahe: true
  clip_limit: 1.2
  mean: [0.0, 0.0, 0.0] # Standard grayscale (0..255)
  std: [255.0, 255.0, 255.0]
