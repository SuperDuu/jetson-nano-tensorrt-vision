# Unified Configuration for RBC2026 Super Manager V2

system:
  initial_state: 2 # 0: IDLE, 1: Target (V1), 2: KFS (V2)
  load_mode: 3 # 1: KFS only, 2: SpearHead only, 3: All models + UART switching
  force_square: True # Use square letterbox for display and error calculation
  headless: true # Run without GUI (terminal only)
  udp_stream: true # Run H.264 UDP network video streamer on background thread
  test_image: false # If true, use a static image instead of camera
  test_image_path: "KFS_Standard/datasets/user_test/img_test_user1.jpg"

detection:
  max_loss_frames: 10 # Frames to keep Kalman prediction after target lost
  x_priority: 0 # 0: left, 1: right priority for symmetric targets

hardware:
  camera:
    device_id: 0
    width: 640
    height: 480
  serial:
    port: "/dev/ttyACM0"
    baudrate: 115200

v1_model:
  name: "SpearHead"
  yolo_engine: "models/yolo_sp.engine"
  device: "GPU"
  input_size: 512
  conf_threshold: 0.7
  nms_threshold: 0.5
  target_name: "Target"
 
v2_model:
  name: "KFS"
  yolo_engine: "models/yolo_kfs.engine"
  yolo_device: "GPU"
  cnn_engine: "models/cnn.engine"
  cnn_device: "GPU"
  labels_json: "models/labels_cnn_kfs.json"
  yolo_input_size: 512
  cnn_input_size: 64
  conf_threshold_yolo: 0.7
  conf_threshold_cnn: 0.7
  background_value: 128
  target_types: ["REAL"]
