# Optimized Configuration for Jetson Nano - TensorRT Version
system:
  async: true

paths:
  models:
    yolo_engine: "models/yolo_best.engine"
    cnn_engine: "models/cnn_best.engine"
    labels_json: "models/labels.json"

# Hardware configuration
hardware:
  camera:
    device_id: 0
    buffer_size: 1
  uart:
    port: "/dev/ttyTHS1" # Standard UART on Jetson Nano
    baudrate: 115200
    frequency_hz: 50

# Model configuration
models:
  yolo:
    device: "GPU"  
    class_id: 0
    input_size: 512  
    conf_threshold: 0.6
    nms_threshold: 0.35

# Detection and tracking configuration
detection:
  target_name: "Target"
  max_loss_frames: 5
  min_confidence: 0.4
  label_smoothing:
    window_size: 7
    grid_size: 40

# Kalman filter configuration
kalman:
  state_size: 4
  measurement_size: 2
  process_noise: 0.01

# Display configuration
display:
  window_name: "JetsonVision"
  show_fps: true
  show_error: true
  font_scale: 0.7
  line_thickness: 2
  headless: false
  force_square: true
